      <tspan x="64" y="148"><tspan>systemPrompt: </tspan><tspan fill="#a6e3a1">&quot;You analyze code.&quot;</tspan><tspan>,</tspan></tspan>
      <tspan x="64" y="168"><tspan>jsonSchema,</tspan></tspan>
      <tspan x="44" y="188"><tspan>}</tspan></tspan>
      <tspan x="24" y="208"><tspan>);</tspan></tspan>
      <tspan x="24" y="228"><tspan></tspan></tspan>
      <tspan x="24" y="248"><tspan fill="#cba6f7">const</tspan><tspan> r1 = </tspan><tspan fill="#cba6f7">await</tspan><tspan> session</tspan><tspan>.</tspan><tspan fill="#89dceb">askJson</tspan><tspan>(p1, Schema);</tspan></tspan>
      <tspan x="24" y="268"><tspan fill="#cba6f7">const</tspan><tspan> r2 = </tspan><tspan fill="#cba6f7">await</tspan><tspan> session</tspan><tspan>.</tspan><tspan fill="#89dceb">askJson</tspan><tspan>(p2, Schema);</tspan></tspan>
      <tspan x="24" y="288"><tspan></tspan></tspan>
      <tspan x="24" y="308"><tspan fill="#cba6f7">await</tspan><tspan> session</tspan><tspan>.</tspan><tspan fill="#89dceb">close</tspan><tspan>();</tspan></tspan>
