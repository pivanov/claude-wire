      <tspan x="24" y="288"><tspan></tspan></tspan>
      <tspan x="24" y="308"><tspan fill="#cba6f7">console</tspan><tspan>.</tspan><tspan fill="#89dceb">log</tspan><tspan>(</tspan><tspan>data.</tspan><tspan fill="#89dceb">answer</tspan><tspan>);  </tspan><tspan fill="#9399b2">// 4</tspan><tspan>);</tspan></tspan>
