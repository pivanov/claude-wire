      <tspan x="24" y="308"><tspan fill="#cba6f7">console</tspan><tspan>.</tspan><tspan fill="#89dceb">log</tspan><tspan>(</tspan><tspan>result.</tspan><tspan fill="#89dceb">tokensOut</tspan><tspan>);  </tspan><tspan fill="#9399b2">// 8</tspan><tspan>);</tspan></tspan>
