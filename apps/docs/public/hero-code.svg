    <text x="654" y="22" font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="11.5" font-weight="600" fill="#a6adc8" text-anchor="end">ts</text>
    <text font-family="ui-monospace,SFMono-Regular,Menlo,Monaco,monospace" font-size="14" fill="#cdd6f4">
