      <tspan x="24" y="108"><tspan></tspan></tspan>
      <tspan x="24" y="128"><tspan fill="#cba6f7">const</tspan><tspan> Schema = </tspan><tspan fill="#94e2d5">z</tspan><tspan>.</tspan><tspan fill="#89dceb">object</tspan><tspan>({</tspan></tspan>
      <tspan x="44" y="148"><tspan>answer: </tspan><tspan fill="#94e2d5">z</tspan><tspan>.</tspan><tspan fill="#89dceb">number</tspan><tspan>(),</tspan></tspan>
      <tspan x="24" y="168"><tspan>});</tspan></tspan>
      <tspan x="24" y="188"><tspan></tspan></tspan>
      <tspan x="24" y="208"><tspan fill="#cba6f7">const</tspan><tspan> { data } = </tspan><tspan fill="#cba6f7">await</tspan><tspan> </tspan><tspan fill="#94e2d5">claude</tspan><tspan>.</tspan><tspan fill="#89dceb">askJson</tspan><tspan>(</tspan></tspan>
