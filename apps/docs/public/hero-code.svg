      <tspan x="24" y="108"><tspan fill="#cba6f7">const</tspan><tspan> stream = </tspan><tspan fill="#94e2d5">claude</tspan><tspan>.</tspan><tspan fill="#89dceb">stream</tspan><tspan>(</tspan></tspan>
      <tspan x="44" y="128"><tspan fill="#a6e3a1">&quot;Refactor src/auth.ts&quot;</tspan><tspan>,</tspan></tspan>
      <tspan x="44" y="148"><tspan>{</tspan></tspan>
      <tspan x="64" y="168"><tspan>model: </tspan><tspan fill="#a6e3a1">&quot;sonnet&quot;</tspan><tspan>,</tspan></tspan>
      <tspan x="44" y="188"><tspan>}</tspan></tspan>
      <tspan x="24" y="208"><tspan>);</tspan></tspan>
      <tspan x="24" y="228"><tspan></tspan></tspan>
      <tspan x="24" y="248"><tspan fill="#cba6f7">for</tspan><tspan> </tspan><tspan fill="#cba6f7">await</tspan><tspan> (</tspan><tspan fill="#cba6f7">const</tspan><tspan> ev </tspan><tspan fill="#cba6f7">of</tspan><tspan> stream</tspan><tspan>.</tspan><tspan fill="#89dceb">events</tspan><tspan>()) {</tspan></tspan>
      <tspan x="44" y="268"><tspan fill="#cba6f7">if</tspan><tspan> (ev.type === </tspan><tspan fill="#a6e3a1">&quot;text&quot;</tspan><tspan>) write(ev.content);</tspan></tspan>
      <tspan x="24" y="288"><tspan>}</tspan></tspan>
      <tspan x="24" y="308"><tspan fill="#cba6f7">const</tspan><tspan> final = </tspan><tspan fill="#cba6f7">await</tspan><tspan> stream</tspan><tspan>.</tspan><tspan fill="#89dceb">result</tspan><tspan>();</tspan></tspan>
